<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小备精修工作台</title>
<script>
if (!new URLSearchParams(window.location.search || "").has("legacy")) {
  window.location.replace("workbench/index.html");
}
</script>
<style>
:root{--bg:#f3f8fe;--card:#ffffffeb;--line:#d8e8f6;--text:#21364b;--muted:#6e8599;--blue:#1e86da;--bluebg:#eef7ff;--mint:#1ea587;--mintbg:#edf9f4;--amber:#d18a1b;--amberbg:#fff5e6;--rose:#cf6b71;--rosebg:#fff0f1;--shadow:0 16px 36px rgba(61,114,165,.12)}
*{box-sizing:border-box}body{margin:0;font-family:"PingFang SC","Microsoft YaHei",sans-serif;background:linear-gradient(180deg,#eef6ff 0,#f9fbff 42%,#fff 100%);color:var(--text)}
a{text-decoration:none;color:inherit}button,input,textarea{font:inherit}
.page{width:min(1380px,calc(100vw - 24px));margin:14px auto 94px}
.topbar{display:flex;justify-content:space-between;align-items:flex-start;gap:14px;padding:16px 18px;border-radius:22px;border:1px solid var(--line);background:#ffffffd8;box-shadow:var(--shadow);backdrop-filter:blur(12px)}
.topbar-left{display:grid;gap:8px}.eyebrow{display:flex;align-items:center;gap:10px;flex-wrap:wrap}.title{font-size:26px;font-weight:800;line-height:1.1}.counts{font-size:14px;color:var(--muted);font-weight:700}
.badge{display:inline-flex;align-items:center;justify-content:center;padding:6px 10px;border-radius:999px;font-size:12px;font-weight:800}.b-blue{background:var(--bluebg);color:var(--blue)}.b-mint{background:var(--mintbg);color:var(--mint)}.b-amber{background:var(--amberbg);color:var(--amber)}.b-rose{background:var(--rosebg);color:var(--rose)}
.topbar-right{display:flex;gap:10px;flex-wrap:wrap;justify-content:flex-end}.btn{border:none;border-radius:14px;padding:11px 15px;font-size:14px;font-weight:800;cursor:pointer;transition:transform .16s ease,box-shadow .16s ease,opacity .16s ease}.btn:hover{transform:translateY(-1px)}.btn:disabled{opacity:.45;cursor:not-allowed;transform:none}.btn-primary{background:linear-gradient(135deg,#1e86da,#53b1ec);color:#fff;box-shadow:0 10px 20px rgba(30,134,218,.22)}.btn-ghost{background:#fff;border:1px solid #c7ddf1;color:var(--blue)}.btn-mint{background:linear-gradient(135deg,#169978,#3dc39b);color:#fff;box-shadow:0 10px 20px rgba(30,165,135,.2)}.btn-danger{background:linear-gradient(135deg,#ca6870,#e38d93);color:#fff}
.layout{display:grid;grid-template-columns:310px minmax(0,1fr);gap:16px;margin-top:16px}
.panel{border:1px solid var(--line);border-radius:24px;background:var(--card);box-shadow:var(--shadow)}
.sidebar{padding:16px}.side-head{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:12px}.side-title{font-size:20px;font-weight:800}.sub{font-size:13px;color:var(--muted);line-height:1.6}
.filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}.filter{border:none;background:#edf5fc;color:var(--muted);padding:9px 12px;border-radius:12px;font-weight:800;cursor:pointer}.filter.active{background:var(--bluebg);color:var(--blue)}
.queue{display:grid;gap:10px;max-height:calc(100vh - 260px);overflow:auto;padding-right:4px}.queue-item{padding:14px;border-radius:18px;border:1px solid var(--line);background:#fff;cursor:pointer;transition:border-color .16s ease,box-shadow .16s ease,transform .16s ease}.queue-item:hover{transform:translateY(-1px)}.queue-item.active{border-color:#8dc2ed;box-shadow:0 10px 20px rgba(30,134,218,.1);background:#fbfdff}.queue-name{font-size:15px;font-weight:800;line-height:1.4}.queue-meta{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px;font-size:12px;color:var(--muted)}.queue-row{display:flex;justify-content:space-between;gap:8px;align-items:flex-start}
.main{padding:16px}.lesson-bar{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;padding:14px 16px;border-radius:18px;background:#f7fbff;border:1px solid var(--line)}.lesson-name{font-size:22px;font-weight:800;margin-bottom:6px}.lesson-info{display:flex;gap:8px;flex-wrap:wrap;font-size:13px;color:var(--muted)}
.stepbar{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin:14px 0 16px}.step{padding:12px;border-radius:16px;border:1px solid var(--line);background:#fff}.step small{display:block;color:var(--muted);font-size:11px;margin-bottom:6px;font-weight:700}.step strong{font-size:14px;line-height:1.4}.step.active{border-color:#89c0ec;background:var(--bluebg)}.step.done{background:var(--mintbg);border-color:#bfe8db}
.mobile-steps{display:none;gap:8px;overflow:auto;padding-bottom:2px;margin-bottom:14px}.mobile-steps button{border:none;border-radius:999px;padding:10px 14px;background:#edf5fc;color:var(--muted);font-weight:800;white-space:nowrap;cursor:pointer}.mobile-steps .active{background:var(--bluebg);color:var(--blue)}
.stage{border:1px solid var(--line);border-radius:24px;background:#fff;padding:18px;min-height:520px}.stage-head{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:14px}.stage-title{font-size:20px;font-weight:800}.helper{font-size:13px;color:var(--muted);line-height:1.6}
.field-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}.field,.field-wide{display:grid;gap:8px}.field-wide{margin-top:12px}label{font-size:13px;color:var(--muted);font-weight:800}input,textarea{width:100%;border:1px solid #c8ddf0;border-radius:14px;padding:12px;background:#fbfdff;color:var(--text);outline:none}textarea{min-height:116px;line-height:1.6;resize:vertical}input:focus,textarea:focus{border-color:#7bb7e6;box-shadow:0 0 0 4px rgba(30,134,218,.1)}
.tipbox{margin-top:12px;padding:14px;border-radius:16px;background:var(--bluebg);color:#40647f;font-size:13px;line-height:1.7}.core-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}.core-card{padding:16px;border:1px solid var(--line);border-radius:18px;background:#fbfdff}.core-card strong{display:block;margin-bottom:8px;font-size:15px}.core-card p{margin:0;color:var(--muted);font-size:13px;line-height:1.7}
.dim-tools{display:flex;justify-content:space-between;gap:10px;align-items:center;margin-bottom:12px}.dim-list{display:grid;gap:12px}.dim-card{padding:14px;border-radius:18px;border:1px solid var(--line);background:#fbfdff}.dim-top{display:flex;justify-content:space-between;gap:10px;align-items:center;margin-bottom:12px}.dim-title{font-size:15px;font-weight:800}.dim-grid{display:grid;grid-template-columns:1.1fr .9fr .9fr;gap:10px;margin-bottom:10px}.mini-link{border:none;background:none;padding:0;color:var(--blue);font-weight:800;cursor:pointer}.mini-link.danger{color:var(--rose)}
.checklist{display:grid;gap:10px;margin-bottom:14px}.check{display:flex;justify-content:space-between;gap:10px;padding:12px 14px;border:1px solid var(--line);border-radius:14px;background:#fbfdff;font-size:13px}.check strong.ok{color:var(--mint)}.check strong.bad{color:var(--amber)}
.advanced{margin-top:14px;border-top:1px dashed var(--line);padding-top:14px}.advanced button{border:none;background:none;padding:0;color:var(--blue);font-weight:800;cursor:pointer}.jsonbox{display:none;margin-top:12px;padding:14px;border:1px solid var(--line);border-radius:16px;background:#f7fbff}.jsonbox.show{display:block}.jsonbox pre{margin:0;white-space:pre-wrap;word-break:break-word;font-size:12px;line-height:1.55;color:#3f607d;max-height:280px;overflow:auto}
.navline{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-top:16px}.stepnav{display:flex;gap:8px;flex-wrap:wrap}.footerbar{position:sticky;bottom:10px;display:flex;justify-content:space-between;align-items:center;gap:12px;margin-top:16px;padding:12px 14px;border-radius:18px;border:1px solid var(--line);background:#fffffff0;box-shadow:0 12px 26px rgba(61,114,165,.1)}.footer-status{font-size:13px;color:var(--muted);line-height:1.6}
.mobile-bottom{display:none;position:fixed;left:12px;right:12px;bottom:12px;padding:10px;border-radius:18px;border:1px solid var(--line);background:#fffffff2;box-shadow:var(--shadow)}
.mobile-bottom .row{display:flex;gap:8px}
@media (max-width:1080px){.layout{grid-template-columns:1fr}.queue{max-height:none}}
@media (max-width:820px){.page{width:min(100vw - 14px,100%);margin:10px auto 104px}.topbar{padding:14px;flex-direction:column}.title{font-size:22px}.topbar-right{width:100%;justify-content:flex-start}.field-grid,.core-grid,.dim-grid,.stepbar{grid-template-columns:1fr}.stepbar{display:none}.mobile-steps{display:flex}.stage{min-height:auto;padding:16px}.stage[data-mobile-hidden="1"]{display:none}.navline,.footerbar{display:none}.mobile-bottom{display:block}}
</style>
</head>
<body>
<div class="page">
    <section class="topbar">
        <div class="topbar-left">
            <div class="eyebrow">
                <span class="badge b-blue">小备精修工作台 v1.1 原型</span>
                <a href="teacher_teach.html" class="sub">返回教学系统</a>
                <a href="teacher_work.html" class="sub">工作系统</a>
            </div>
            <div class="title">小备精修工作台</div>
            <div class="counts" id="topCounts">待生成 0｜草稿 0｜已发布 0</div>
        </div>
        <div class="topbar-right">
            <a class="btn btn-primary" href="xiaobei_quick_prep.html">快速备课入口</a>
            <a class="btn btn-ghost" href="xiaobei_quick_draft_internal.html" id="internalDraftLink" style="display:none">内部草稿审核</a>
            <button class="btn btn-ghost" id="saveBtnTop" type="button">保存草稿</button>
            <button class="btn btn-ghost" id="resetBtn" type="button">恢复示例数据</button>
        </div>
    </section>

    <div class="layout">
        <aside class="panel sidebar">
            <div class="side-head">
                <div>
                    <div class="side-title">待处理课题</div>
                    <div class="sub">先选课题，再生成或确认这条小备。</div>
                </div>
                <span class="badge b-blue" id="queueCount">0 条</span>
            </div>
            <div class="filters" id="filters"></div>
            <div class="queue" id="queue"></div>
        </aside>

        <main class="panel main">
            <div class="lesson-bar">
                <div>
                    <div class="lesson-name" id="lessonName">请选择课题</div>
                    <div class="lesson-info" id="lessonInfo"></div>
                </div>
                <span class="badge b-amber" id="lessonStatusBadge">待生成</span>
            </div>

            <div class="stepbar" id="stepbar"></div>
            <div class="mobile-steps" id="mobileSteps"></div>

            <section class="stage" id="stage"></section>

            <div class="navline">
                <div class="stepnav">
                    <button class="btn btn-ghost" id="prevStepBtn" type="button">上一步</button>
                    <button class="btn btn-ghost" id="nextStepBtn" type="button">下一步</button>
                </div>
                <div class="sub">正式版这里会接真实接口；当前发布仍是预演，不直写正式表。</div>
            </div>

            <div class="footerbar">
                <div class="footer-status" id="footerStatus">当前只是前端原型，保存和发布只写本地示例数据。</div>
                <div style="display:flex;gap:10px;flex-wrap:wrap">
                    <button class="btn btn-ghost" id="saveBtnBottom" type="button">保存草稿</button>
                    <button class="btn btn-mint" id="publishBtn" type="button">发布到系统（预演）</button>
                </div>
            </div>
        </main>
    </div>
</div>

<div class="mobile-bottom">
    <div class="row">
        <button class="btn btn-ghost" id="mobileSaveBtn" type="button" style="flex:1">保存</button>
        <button class="btn btn-mint" id="mobilePublishBtn" type="button" style="flex:1">发布</button>
    </div>
</div>

<script>
const STORAGE_KEY='xiaobei_generator_demo_v11';
const steps=[
    {id:'pick',num:'01',title:'确认课题',desc:'先确认这次要精修哪条备课包'},
    {id:'draft',num:'02',title:'生成草稿',desc:'把作业要求和老师提示先写可用'},
    {id:'dims',num:'03',title:'确认维度',desc:'把评价维度收成 3 到 4 个'},
    {id:'publish',num:'04',title:'确认发布',desc:'只做必要检查，再发布预演'},
];
const seedLessons=[
    {id:'home-5-1',status:'pending',grade_scope:'五年级',class_scope:'五(1)班、五(3)班、五(4)班',topic_seq:'4',topic_name:'理想的居住环境',updated_at:'2026-04-21 01:04',teacher_hint:'这批课题刚自动补完作业槽，建议先快速发一个可用的小备版本，优先稳住作业要求和评价维度。',work_requirement:'',key_points:'',main_content:'',core_activity:'',dimensions:[]},
    {id:'paper-4',status:'draft',grade_scope:'四年级',class_scope:'四(1)班、四(2)班',topic_seq:'2-2',topic_name:'纸卷动物',updated_at:'2026-04-20 23:41',teacher_hint:'不要把创意拉太满，先把造型识别、结构稳定、细节整理三层维度做扎实。',work_requirement:'用纸卷、折叠和粘贴完成一只动物作品，重点呈现动物主体造型和局部特征。',key_points:'重点看动物特征是否明确，结构是否稳定，细节是否围绕主题展开。',main_content:'纸卷造型、身体比例、局部拼接和整体整理。',core_activity:'先观察动物身体结构，再分步骤完成主体、局部特征和收尾整理。',dimensions:[{id:'A',name:'造型识别度',description:'是否能看出明确动物特征。',max_score:35,weight:0.35},{id:'B',name:'结构稳定性',description:'卷折和粘贴是否牢固，主体是否站得住。',max_score:35,weight:0.35},{id:'C',name:'细节完成度',description:'局部细节是否服务主题，整体是否完整。',max_score:30,weight:0.30}]},
    {id:'gradient-3',status:'published',grade_scope:'三年级',class_scope:'三(4)班、三(5)班',topic_seq:'1-1',topic_name:'渐变的魅力',updated_at:'2026-04-20 22:12',teacher_hint:'这条已经发布，可以作为结构示例。',work_requirement:'围绕同色系渐变练习完成一张有主次层次的作品，重点表现色彩过渡和主体关系。',key_points:'重点看渐变是否自然、主体是否清楚、整体整理是否完整。',main_content:'同类色过渡、主体与背景关系、层次整理。',core_activity:'先做色阶练习，再把渐变效果迁移到主体画面里。',dimensions:[{id:'A',name:'渐变控制',description:'色阶过渡自然，颜色连接干净。',max_score:40,weight:0.40},{id:'B',name:'主体表现',description:'主体位置明确，层次清楚。',max_score:30,weight:0.30},{id:'C',name:'整体整理',description:'整体完整度和收尾情况。',max_score:30,weight:0.30}]}
];

let state=loadState();
let filter='all';
let activeLessonId=state.lessons[0]?.id||'';
let currentStep='pick';
let jsonExpanded=false;

function clone(value){return JSON.parse(JSON.stringify(value))}
function loadState(){try{const saved=JSON.parse(localStorage.getItem(STORAGE_KEY));if(saved&&Array.isArray(saved.lessons)&&saved.lessons.length)return saved}catch(error){}return{lessons:clone(seedLessons)}}
function saveState(message='草稿已保存到浏览器本地。'){localStorage.setItem(STORAGE_KEY,JSON.stringify(state));setFooterStatus(message)}
function resetState(){state={lessons:clone(seedLessons)};activeLessonId=state.lessons[0]?.id||'';currentStep='pick';jsonExpanded=false;saveState('已恢复示例数据。');renderAll()}

function nowText(){const d=new Date();const pad=n=>String(n).padStart(2,'0');return`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`}
function activeLesson(){return state.lessons.find(item=>item.id===activeLessonId)||state.lessons[0]||null}
function filteredLessons(){return filter==='all'?state.lessons:state.lessons.filter(item=>item.status===filter)}
function statusLabel(status){if(status==='draft')return'草稿中';if(status==='published')return'已发布';return'待生成'}
function statusClass(status){if(status==='draft')return'b-amber';if(status==='published')return'b-mint';return'b-blue'}

function setFooterStatus(message){document.getElementById('footerStatus').textContent=message}
function lessonCounts(){return{pending:state.lessons.filter(item=>item.status==='pending').length,draft:state.lessons.filter(item=>item.status==='draft').length,published:state.lessons.filter(item=>item.status==='published').length}}
function renderTopCounts(){const counts=lessonCounts();document.getElementById('topCounts').textContent=`待生成 ${counts.pending}｜草稿 ${counts.draft}｜已发布 ${counts.published}`}

function renderFilters(){const tabs=[['all','全部'],['pending','待生成'],['draft','草稿中'],['published','已发布']];document.getElementById('filters').innerHTML=tabs.map(tab=>`<button type="button" class="filter ${filter===tab[0]?'active':''}" onclick="setFilter('${tab[0]}')">${tab[1]}</button>`).join('')}
function renderQueue(){const lessons=filteredLessons();if(!lessons.find(item=>item.id===activeLessonId)&&lessons[0])activeLessonId=lessons[0].id;document.getElementById('queueCount').textContent=`${lessons.length} 条`;document.getElementById('queue').innerHTML=lessons.length?lessons.map(item=>`<div class="queue-item ${item.id===activeLessonId?'active':''}" onclick="pickLesson('${item.id}')"><div class="queue-row"><div class="queue-name">${item.topic_seq} ${item.topic_name}</div><span class="badge ${statusClass(item.status)}">${statusLabel(item.status)}</span></div><div class="queue-meta"><span>${item.grade_scope}</span><span>${item.updated_at}</span></div></div>`).join(''):`<div class="queue-item"><div class="queue-name">当前筛选下没有课题</div><div class="queue-meta"><span>可以先切回“全部”，或者恢复示例数据。</span></div></div>`}

function renderLessonBar(){const lesson=activeLesson();if(!lesson)return;document.getElementById('lessonName').textContent=`${lesson.topic_seq} ${lesson.topic_name}`;document.getElementById('lessonInfo').innerHTML=`<span>${lesson.grade_scope}</span><span>${lesson.class_scope}</span><span>更新于 ${lesson.updated_at}</span>`;const badge=document.getElementById('lessonStatusBadge');badge.textContent=statusLabel(lesson.status);badge.className=`badge ${statusClass(lesson.status)}`}

function stepIndex(stepId){return steps.findIndex(step=>step.id===stepId)}
function renderStepbar(){const idx=stepIndex(currentStep);document.getElementById('stepbar').innerHTML=steps.map((step,i)=>`<div class="step ${i===idx?'active':''} ${i<idx?'done':''}"><small>${step.num}</small><strong>${step.title}</strong><div class="sub">${step.desc}</div></div>`).join('');document.getElementById('mobileSteps').innerHTML=steps.map(step=>`<button type="button" class="${step.id===currentStep?'active':''}" onclick="goStep('${step.id}')">${step.title}</button>`).join('')}

function escapeHtml(value){return String(value??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;')}
function numberOrZero(value){const num=Number(value);return Number.isFinite(num)?num:0}

function recomputeWeights(lesson){const total=(lesson.dimensions||[]).reduce((sum,dim)=>sum+numberOrZero(dim.max_score),0);(lesson.dimensions||[]).forEach(dim=>{dim.weight=total>0?Number((numberOrZero(dim.max_score)/total).toFixed(2)):0})}
function syncHeaderOnly(){renderTopCounts();renderQueue();renderLessonBar()}
function updateLesson(mutator,{rerender=true,statusFallback=true}={}){const lesson=activeLesson();if(!lesson)return;mutator(lesson);if(Array.isArray(lesson.dimensions))recomputeWeights(lesson);lesson.updated_at=nowText();if(statusFallback&&lesson.status==='published')lesson.status='draft';if(rerender)renderAll();else syncHeaderOnly()}

function addDimension(seed){updateLesson(lesson=>{lesson.dimensions.push({id:seed?.id||String.fromCharCode(65+lesson.dimensions.length),name:seed?.name||'',description:seed?.description||'',max_score:Number(seed?.max_score||0),weight:Number(seed?.weight||0)})})}
function removeDimension(index){updateLesson(lesson=>{lesson.dimensions.splice(index,1)})}
function cloneDimension(index){const lesson=activeLesson();if(!lesson||!lesson.dimensions[index])return;addDimension(clone(lesson.dimensions[index]))}
function updateDimension(index,key,value){updateLesson(lesson=>{if(!lesson.dimensions[index])return;lesson.dimensions[index][key]=key==='max_score'?numberOrZero(value):value},{rerender:true})}
function updateField(key,value){updateLesson(lesson=>{lesson[key]=value},{rerender:false})}

function generateDraft(){updateLesson(lesson=>{lesson.work_requirement=`围绕“${lesson.topic_name}”完成一件课堂作品，先把主体结构做稳，再补充色彩、环境或装饰，让主题表达更明确。`;lesson.teacher_hint=`这节课先把“${lesson.topic_name}”的主体表达稳住，不要一开始把要求放得太散。优先看学生是否清楚表达主题，再看细节和整理。`;lesson.key_points=`重点看作品是否围绕 ${lesson.topic_name} 展开，结构是否完整，细节是否服务主题。`;lesson.main_content=`${lesson.topic_name} 的主题理解、主体造型/组织、局部细节和整体整理。`;lesson.core_activity='老师先带学生拆解任务，再分步骤完成主体、补充细节、最后统一整理作品。';lesson.dimensions=[{id:'A',name:'主题表达',description:`是否能围绕“${lesson.topic_name}”清楚表达核心主题。`,max_score:35,weight:0.35},{id:'B',name:'结构完成度',description:'主体结构是否完整，关键部分是否稳定清楚。',max_score:35,weight:0.35},{id:'C',name:'细节与整理',description:'细节是否服务主题，整体是否完整收拾。',max_score:30,weight:0.30}];lesson.status='draft'});currentStep='draft';setFooterStatus('已生成一版小备草稿。现在先看作业要求和老师提示是否可用。')}

function validations(){const lesson=activeLesson();if(!lesson)return[];const dimensions=lesson.dimensions||[];const totalScore=dimensions.reduce((sum,dim)=>sum+numberOrZero(dim.max_score),0);const totalWeight=dimensions.reduce((sum,dim)=>sum+Number(dim.weight||0),0);return[
{label:'作业要求已填写',ok:Boolean((lesson.work_requirement||'').trim()),text:(lesson.work_requirement||'').trim()?'已完成':'未填写'},
{label:'评价维度不少于 3 个',ok:dimensions.length>=3,text:dimensions.length?`当前 ${dimensions.length} 个`:'当前 0 个'},
{label:'总分等于 100',ok:totalScore===100,text:`当前 ${totalScore}`},
{label:'权重合计等于 1.0',ok:Math.abs(totalWeight-1)<0.01,text:`当前 ${totalWeight.toFixed(2)}`},
]}

function dimensionPayload(){const lesson=activeLesson();return{version:'v1',source:'xiaobei_generator_preview',topic_seq:lesson.topic_seq,topic_name:lesson.topic_name,grade_scope:lesson.grade_scope,dimensions:(lesson.dimensions||[]).map((dim,index)=>({id:dim.id||String.fromCharCode(65+index),name:dim.name||`维度${index+1}`,description:dim.description||'',max_score:numberOrZero(dim.max_score),weight:Number(Number(dim.weight||0).toFixed(2))}))}}

function renderPickStage(lesson){return`
<div class="stage-head"><div><div class="stage-title">Step 1 确认课题</div><div class="helper">左侧已经完成选择，这一步只确认这条备课包是不是你现在要继续精修的那一条。</div></div><span class="badge ${statusClass(lesson.status)}">${statusLabel(lesson.status)}</span></div>
<div class="core-grid">
    <div class="core-card"><strong>课题信息</strong><p>${lesson.topic_seq} ${lesson.topic_name}<br>${lesson.grade_scope}<br>${lesson.class_scope}</p></div>
    <div class="core-card"><strong>当前状态</strong><p>${statusLabel(lesson.status)}。如果这节课刚建新作业，建议先点“生成小备草稿”，把作业要求和评价维度先跑起来。</p></div>
</div>
<div class="tipbox">这一步只回答一个问题：这条课题是不是现在要进入“小备 -> 提交机 -> 小评”链路的那一条。如果是，就进入下一步生成草稿。</div>`}

function renderDraftStage(lesson){return`
<div class="stage-head"><div><div class="stage-title">Step 2 生成草稿</div><div class="helper">这里只保留老师最需要判断的 4 个核心字段：作业要求、老师提示、评价要点、核心活动。</div></div><button type="button" class="btn btn-primary" onclick="generateDraft()">生成小备草稿</button></div>
<div class="field-grid">
    <div class="field"><label>课题序号</label><input value="${escapeHtml(lesson.topic_seq)}" oninput="updateField('topic_seq',this.value)"></div>
    <div class="field"><label>年级范围</label><input value="${escapeHtml(lesson.grade_scope)}" oninput="updateField('grade_scope',this.value)"></div>
    <div class="field"><label>课题名称</label><input value="${escapeHtml(lesson.topic_name)}" oninput="updateField('topic_name',this.value)"></div>
    <div class="field"><label>适用班级</label><input value="${escapeHtml(lesson.class_scope)}" oninput="updateField('class_scope',this.value)"></div>
</div>
<div class="field-wide"><label>作业要求</label><textarea oninput="updateField('work_requirement',this.value)">${escapeHtml(lesson.work_requirement)}</textarea></div>
<div class="field-wide"><label>老师提示</label><textarea oninput="updateField('teacher_hint',this.value)">${escapeHtml(lesson.teacher_hint)}</textarea></div>
<div class="field-wide"><label>评价要点</label><textarea oninput="updateField('key_points',this.value)">${escapeHtml(lesson.key_points)}</textarea></div>
<div class="field-wide"><label>核心活动</label><textarea oninput="updateField('core_activity',this.value)">${escapeHtml(lesson.core_activity)}</textarea></div>
<div class="tipbox">正式版这里会接 AI 和飞书草稿接口。当前原型先验证：老师能不能快速判断这 4 个核心内容“够不够上课”。</div>`}

function renderDimsStage(lesson){return`
<div class="stage-head"><div><div class="stage-title">Step 3 确认评价维度</div><div class="helper">老师默认只看维度卡片，不直接看 JSON。分值用数字，权重自动跟着总分计算。</div></div><button type="button" class="btn btn-ghost" onclick="addDimension()">新增维度</button></div>
<div class="dim-tools"><div class="sub">建议保留 3 到 4 个维度，先把评价边界立清楚。</div><div class="badge b-blue">总分 ${(lesson.dimensions||[]).reduce((sum,dim)=>sum+numberOrZero(dim.max_score),0)}</div></div>
<div class="dim-list">
${(lesson.dimensions||[]).length?(lesson.dimensions||[]).map((dim,index)=>`<div class="dim-card"><div class="dim-top"><div class="dim-title">${dim.id||String.fromCharCode(65+index)} ${dim.name||`维度 ${index+1}`}</div><div style="display:flex;gap:10px"><button type="button" class="mini-link" onclick="cloneDimension(${index})">复制</button><button type="button" class="mini-link danger" onclick="removeDimension(${index})">删除</button></div></div><div class="dim-grid"><div class="field"><label>名称</label><input value="${escapeHtml(dim.name)}" onchange="updateDimension(${index},'name',this.value)"></div><div class="field"><label>分值</label><input type="number" min="0" max="100" step="1" value="${numberOrZero(dim.max_score)}" onchange="updateDimension(${index},'max_score',this.value)"></div><div class="field"><label>权重（自动）</label><input type="number" step="0.01" value="${Number(dim.weight||0).toFixed(2)}" readonly></div></div><div class="field"><label>描述</label><textarea onchange="updateDimension(${index},'description',this.value)">${escapeHtml(dim.description)}</textarea></div></div>`).join(''):`<div class="tipbox">当前还没有评价维度。先点“生成小备草稿”，或者手动新增 3 个维度卡片。</div>`}
</div>`}

function renderPublishStage(lesson){const checks=validations();const payload=dimensionPayload();return`
<div class="stage-head"><div><div class="stage-title">Step 4 确认发布</div><div class="helper">发布前只做必要检查。JSON 默认隐藏，只有需要调试时再展开。</div></div><span class="badge ${statusClass(lesson.status)}">${statusLabel(lesson.status)}</span></div>
<div class="checklist">${checks.map(item=>`<div class="check"><span>${item.label}</span><strong class="${item.ok?'ok':'bad'}">${item.text}</strong></div>`).join('')}</div>
<div class="tipbox">v1 的重点不是写出完整精备，而是把这条课题变成“可供提交机和小评使用”的结构化小备。</div>
<div class="advanced"><button type="button" onclick="toggleJson()">${jsonExpanded?'隐藏 JSON':'查看 JSON'}</button><div class="jsonbox ${jsonExpanded?'show':''}"><pre>${escapeHtml(JSON.stringify(payload,null,2))}</pre></div></div>`}

function renderStage(){const lesson=activeLesson();if(!lesson)return;let html='';if(currentStep==='pick')html=renderPickStage(lesson);if(currentStep==='draft')html=renderDraftStage(lesson);if(currentStep==='dims')html=renderDimsStage(lesson);if(currentStep==='publish')html=renderPublishStage(lesson);const stage=document.getElementById('stage');stage.innerHTML=html;stage.dataset.mobileHidden='0';document.getElementById('prevStepBtn').disabled=stepIndex(currentStep)===0;document.getElementById('nextStepBtn').disabled=stepIndex(currentStep)===steps.length-1;const publishReady=validations().every(item=>item.ok);document.getElementById('publishBtn').disabled=!publishReady;document.getElementById('mobilePublishBtn').disabled=!publishReady}
function renderStageOnly(){renderTopCounts();renderLessonBar();renderStepbar();renderStage()}
function renderAll(){renderTopCounts();renderFilters();renderQueue();renderLessonBar();renderStepbar();renderStage()}

function pickLesson(id){activeLessonId=id;currentStep='pick';jsonExpanded=false;renderAll()}
function setFilter(next){filter=next;renderAll()}
function goStep(stepId){currentStep=stepId;renderStageOnly()}
function nextStep(){const idx=stepIndex(currentStep);if(idx<steps.length-1){currentStep=steps[idx+1].id;renderStageOnly()}}
function prevStep(){const idx=stepIndex(currentStep);if(idx>0){currentStep=steps[idx-1].id;renderStageOnly()}}
function toggleJson(){jsonExpanded=!jsonExpanded;renderStage()}

function publishPreview(){const lesson=activeLesson();if(!lesson)return;const ready=validations().every(item=>item.ok);if(!ready){setFooterStatus('发布条件还没满足，先把作业要求、维度数量和总分补齐。');currentStep='publish';renderStageOnly();return}updateLesson(item=>{item.status='published'},{rerender:true,statusFallback:false});saveState('这条小备已标记为“已发布（预演）”。当前仍不会真实写飞书。');setFooterStatus('已完成发布预演。下一步可以接真实草稿保存和发布接口。')}

document.getElementById('saveBtnTop').addEventListener('click',()=>saveState());
document.getElementById('saveBtnBottom').addEventListener('click',()=>saveState());
document.getElementById('mobileSaveBtn').addEventListener('click',()=>saveState());
document.getElementById('publishBtn').addEventListener('click',publishPreview);
document.getElementById('mobilePublishBtn').addEventListener('click',publishPreview);
document.getElementById('resetBtn').addEventListener('click',resetState);
document.getElementById('nextStepBtn').addEventListener('click',nextStep);
document.getElementById('prevStepBtn').addEventListener('click',prevStep);

window.addEventListener('resize',renderStageOnly);
renderAll();
fetch('/api/xiaobei/ai/internal_ui_status')
  .then(resp=>resp.json())
  .then(data=>{
    if(data&&data.success&&data.enabled){
      const link=document.getElementById('internalDraftLink');
      if(link) link.style.display='inline-flex';
    }
  })
  .catch(()=>{});
setFooterStatus('这版现在定位为“精修工作台”。前面会再有一个更轻的快速备课入口，两边共用同一份备课包。');
</script>
</body>
</html>
